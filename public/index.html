<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0a0a0a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Waverz.net">
  <title>Waverz.net</title>
  <link rel="manifest" href="/manifest.webmanifest?v=20260506f">
  <link rel="icon" href="/img/favicon/favicon.ico" sizes="any">
  <link rel="icon" type="image/png" sizes="16x16" href="/img/favicon/favicon-16x16.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/img/favicon/favicon-32x32.png">
  <link rel="apple-touch-icon" href="/img/favicon/apple-touch-icon.png">
  <link rel="stylesheet" href="/style.css?v=20260506f">
</head>
<body>
  <main id="app">
    <header class="bar">
      <h1>WAVERZ.NET</h1>
      <div class="bar-actions">
        <button id="about-btn" class="icon-btn" aria-label="About" type="button">?</button>
        <button id="share" class="icon-btn" aria-label="Share" type="button">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="18" cy="5" r="3"></circle>
            <circle cx="6" cy="12" r="3"></circle>
            <circle cx="18" cy="19" r="3"></circle>
            <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line>
            <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line>
          </svg>
        </button>
        <button id="mode-toggle" class="icon-btn" aria-label="Settings" type="button">⚙︎</button>
      </div>
    </header>

    <section id="now" class="now" aria-live="polite">
      <div class="now-header">
        <a id="now-station" class="now-station">—</a>
        <div class="now-city"></div>
      </div>
      <div class="now-channel"></div>
      <div class="status" id="status"></div>
      <div class="controls">
        <button id="play" class="btn btn-primary" type="button" aria-label="Play">▶︎ PLAY</button>
        <button id="next" class="btn" type="button" aria-label="Next station">⏭︎ NEXT</button>
      </div>
      <div class="now-meta" id="now-meta">
        <div class="now-meta-title" id="now-meta-title"></div>
        <div class="now-meta-sub" id="now-meta-sub"></div>
      </div>
    </section>

    <section class="skin-section" aria-label="Skin">
      <div class="list-label">SKIN</div>
      <div class="skin-row" id="skin-row" role="radiogroup" aria-label="Skin"></div>
    </section>

    <section class="list-wrap">
      <div class="list-label">STATIONS</div>
      <ul id="list" class="list"></ul>
    </section>
  </main>
  <div id="about-modal" class="modal-backdrop" hidden>
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="about-title">
      <div class="modal-header">
        <div id="about-title" class="modal-title">WAVERZ.NET</div>
        <button id="modal-close" class="icon-btn" aria-label="Close" type="button">✕</button>
      </div>
      <div class="modal-desc">
        A curated web radio player made to be simple, fast, and fun. Tune in, 
        hop between stations using NEXT or SWIPE, and customise with SKINS.
      </div>
      <div class="modal-contact">
        Got feedback, a feature idea, or something broken?<br>
        Reach out at <a class="modal-link" href="mailto:contact@waverz.net">contact@waverz.net</a>
      </div>
      <div class="modal-footer" id="modal-footer"></div>
    </div>
  </div>
  <script type="module" src="/app.js?v=20260506f"></script>
</body>
</html>
