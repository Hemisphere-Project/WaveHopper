; WaveHopper M5Stack CoreS3 / CoreS3 SE firmware.
;
; Platform is the pioarduino fork pinned by release URL — the official
; `espressif32` platform only ships Arduino core 2.x, which ESP32-audioI2S >= 3.x
; cannot compile against (it needs the IDF 5 I2S driver from Arduino core 3.x).
; Do NOT "simplify" this back to `platform = espressif32`. Upgrades happen by
; deliberately changing the pinned release URL.
;
; ESP32-audioI2S is pinned by git tag because the PlatformIO registry copy
; (esphome/ESP32-audioI2S@2.0.7) is ancient and core-2.x-only.
; M5Unified and M5GFX must be upgraded together — mismatched pairs break builds.

[platformio]
default_envs = m5stack-cores3

[env:m5stack-cores3]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.39/platform-espressif32.zip
framework = arduino
board = m5stack-cores3            ; also correct for the SE — M5Unified detects it at runtime
board_build.partitions = partitions.csv
board_build.filesystem = littlefs
monitor_speed = 115200
upload_speed = 1500000
build_flags =
    -DCORE_DEBUG_LEVEL=3
    ; setup() runs boot sync/OTA on the loop task — verified-TLS handshakes
    ; (mbedtls cert chain) overflow the 8 KB default (stack canary panic).
    -DARDUINO_LOOP_STACK_SIZE=16384
    -DWH_FW_VERSION=\"0.2.0\"
    -DWH_FW_BUILD=2
lib_deps =
    m5stack/M5Unified@^0.2.7
    m5stack/M5GFX@^0.2.9
    bblanchon/ArduinoJson@^7.4.2
    ; ESP32-audioI2S is VENDORED under lib/ (forked from tag 3.4.6) so we can
    ; patch its TS demuxer — see lib/ESP32-audioI2S/WAVEHOPPER-PATCHES.md.
    ; PlatformIO auto-includes lib/*; do NOT re-add the upstream git dep or it
    ; will shadow the fork.
    ; Module Audio (M144, ES8388): pinned by commit — the only tag (0.0.1)
    ; predates the current API entirely.
    https://github.com/m5stack/M5Module-Audio.git#8dd02b3a0feb5351cb0af11d59c14401dc675b55

; Bench-test build: content host redirected to a LAN dev server over plain
; HTTP (php -S serving players/web/public). NEVER publish binaries from this
; env — the OTA/content path is unverified. Usage:
;   pio run -e m5stack-cores3-dev -t upload
[env:m5stack-cores3-dev]
extends = env:m5stack-cores3
; NOTE: to bump version/build for an OTA bench test, write the full flag list
; here explicitly — mixing ${...} inheritance with -U/-D overrides gets
; reordered by PlatformIO and leaves the macros undefined.
build_flags =
    ${env:m5stack-cores3.build_flags}
    -DWH_DEV_INSECURE_HOST=\"192.168.8.76:3111\"
    ; add -DWH_TS_DIAG here to re-enable TS demuxer + HLS segment-fetch diagnostics
