; WaveHopper M5Stack CoreS3 / CoreS3 SE firmware.
;
; Platform is the pioarduino fork pinned by release URL — the official
; `espressif32` platform only ships Arduino core 2.x, which ESP32-audioI2S >= 3.x
; cannot compile against (it needs the IDF 5 I2S driver from Arduino core 3.x).
; Do NOT "simplify" this back to `platform = espressif32`. Upgrades happen by
; deliberately changing the pinned release URL.
;
; ESP32-audioI2S is pinned by git tag because the PlatformIO registry copy
; (esphome/ESP32-audioI2S@2.0.7) is ancient and core-2.x-only.
; M5Unified and M5GFX must be upgraded together — mismatched pairs break builds.

[env:m5stack-cores3]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.39/platform-espressif32.zip
framework = arduino
board = m5stack-cores3            ; also correct for the SE — M5Unified detects it at runtime
board_build.partitions = partitions.csv
board_build.filesystem = littlefs
monitor_speed = 115200
upload_speed = 1500000
build_flags =
    -DCORE_DEBUG_LEVEL=3
    -DWH_FW_VERSION=\"0.1.0\"
    -DWH_FW_BUILD=1
lib_deps =
    m5stack/M5Unified@^0.2.7
    m5stack/M5GFX@^0.2.9
    bblanchon/ArduinoJson@^7.4.2
    https://github.com/schreibfaul1/ESP32-audioI2S.git#3.4.6
