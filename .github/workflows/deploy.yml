# Auto-deploy the web docroot to production (Infomaniak) on push to main.
#
# Only fires when the deployable tree changed. Build artifacts are committed
# by design (see docs/ARCHITECTURE.md), so this verifies they're in sync with
# content/ sources and rsyncs them — no build step in CI.
#
# One-time setup (repo Settings → Secrets and variables → Actions):
#   DEPLOY_HOST  ssh host (e.g. h2web504.infomaniak.ch or your ssh alias host)
#   DEPLOY_USER  ssh user of the hosting account
#   DEPLOY_KEY   private key (generate a dedicated pair: ssh-keygen -t ed25519;
#                add the PUBLIC key to the host's authorized_keys / Manager)
#   DEPLOY_PATH  absolute docroot path on the host (the folder waverz.net serves)
# Plus: enable SSH on the Infomaniak hosting (Manager → Web hosting → SSH).

name: deploy-web

on:
  push:
    branches: [main]
    paths:
      - 'players/web/public/**'
      - '.github/workflows/deploy.yml'

concurrency:
  group: deploy-web
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify committed artifacts match content sources
        run: |
          python3 tools/build.py
          if ! git diff --exit-code --stat; then
            echo "::error::players/web/public artifacts are out of sync with content/ — run tools/build.py locally and commit"
            exit 1
          fi

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Rsync docroot
        # -c (checksum): CI checkouts have fresh mtimes; without it every file
        # would re-upload on every deploy. --delete keeps the docroot an exact
        # mirror, except the server-writable metadata cache.
        run: |
          rsync -rlvcz --delete \
            --exclude 'api/cache/*' \
            -e "ssh -i ~/.ssh/deploy_key" \
            players/web/public/ \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:${{ secrets.DEPLOY_PATH }}/"

      - name: Smoke check
        run: |
          sleep 3
          curl -sf -o /dev/null https://waverz.net/stations.json
          curl -sf -o /dev/null https://waverz.net/content/m5cores3/manifest.json
          echo "deployed OK"
